<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentes Digitais</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0e0e1a;
  --card: #13131f;
  --card2: #1a1a28;
  --border: #2a2a3e;
  --border2: #3a3a52;
  --white: #f0eef8;
  --muted: #7a7a9a;
  --rose: #d4607a;
  --rose2: #f0a0b8;
  --gold: #d4a843;
  --blue: #6080d4;
  --green: #5ab88a;
  --purple: #9060c8;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* PARTICLES */
#particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.p-star { position:absolute; border-radius:50%; background:white;
  animation: ptw var(--d,3s) infinite alternate; }
@keyframes ptw { from{opacity:var(--oa,.05)} to{opacity:var(--ob,.4)} }

/* HEADER */
header {
  position: relative; z-index:1;
  padding: 60px 24px 48px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d0d1e, var(--bg));
}
header::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 0%, #d4607a14, transparent 60%);
}
.logo-tag {
  font-size:10px; letter-spacing:5px; color:var(--rose2);
  text-transform:uppercase; margin-bottom:14px;
}
.logo-title {
  font-family:'Cormorant Garamond', serif;
  font-size: clamp(36px,10vw,64px);
  font-weight:300; line-height:1.1;
}
.logo-title em { color:var(--rose); font-style:italic; }
.logo-sub { font-size:13px; color:var(--muted); margin-top:10px; }
.logo-line {
  width:60px; height:1px;
  background: linear-gradient(90deg, transparent, var(--rose), transparent);
  margin:20px auto 0;
}

/* SEARCH / FILTER */
.controls {
  position: relative; z-index:1;
  padding: 24px 20px;
  display: flex; flex-direction:column; gap:16px;
  max-width: 700px; margin: 0 auto;
}
.search-wrap { position:relative; }
.search-wrap input {
  width:100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px 14px 44px;
  color: var(--white);
  font-family:'Outfit',sans-serif; font-size:14px;
  outline:none; transition: border-color .2s;
}
.search-wrap input:focus { border-color:var(--rose); }
.search-wrap input::placeholder { color:var(--muted); }
.search-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  font-size:16px; pointer-events:none;
}
.filters { display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 16px;
  color: var(--muted);
  font-family:'Outfit',sans-serif; font-size:12px;
  cursor:pointer; transition: all .2s;
  letter-spacing:.5px;
}
.filter-btn:hover { border-color:var(--border2); color:var(--white); }
.filter-btn.active {
  background: var(--rose);
  border-color: var(--rose);
  color: white;
}

/* GRID */
.grid-wrap {
  position:relative; z-index:1;
  max-width:700px; margin:0 auto;
  padding: 8px 20px 80px;
}
.grid-label {
  font-size:11px; letter-spacing:3px; color:var(--muted);
  text-transform:uppercase; margin-bottom:16px;
}
.cards-grid {
  display:grid;
  grid-template-columns: 1fr;
  gap:12px;
}

/* CARD */
.pcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow:hidden;
  transition: border-color .25s, transform .25s, box-shadow .25s;
  opacity:0; transform:translateY(16px);
  transition: opacity .5s, transform .5s, border-color .25s, box-shadow .25s;
}
.pcard.visible { opacity:1; transform:translateY(0); }
.pcard:hover {
  border-color: var(--border2);
  box-shadow: 0 8px 32px #00000033;
  transform: translateY(-2px);
}
.pcard-inner {
  display:flex; align-items:center; gap:0;
}
.pcard-accent {
  width:4px; align-self:stretch;
  border-radius:0; flex-shrink:0;
  background: var(--accent, var(--rose));
}
.pcard-body {
  flex:1; padding:18px 16px 18px 20px;
  display:flex; align-items:center; gap:16px;
}
.pcard-icon {
  font-size:28px; flex-shrink:0;
  width:48px; height:48px;
  background: var(--card2);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
}
.pcard-info { flex:1; min-width:0; }
.pcard-name {
  font-family:'Cormorant Garamond',serif;
  font-size:18px; font-weight:400;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.pcard-cat {
  font-size:11px; color:var(--muted);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-top:3px;
}
.pcard-actions {
  display:flex; gap:8px; flex-shrink:0;
  padding-right:16px;
}
.btn-action {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px;
  border-radius:8px;
  font-family:'Outfit',sans-serif;
  font-size:12px; font-weight:500;
  cursor:pointer; border:none;
  transition: all .2s; white-space:nowrap;
}
.btn-prompt {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-prompt:hover { border-color:var(--gold); color:var(--gold); }
.btn-ficha {
  background: var(--rose);
  color: white;
  box-shadow: 0 2px 12px #d4607a33;
}
.btn-ficha:hover { opacity:.88; transform:scale(1.03); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:#000000cc;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s;
  padding:0;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius:24px 24px 0 0;
  width:100%; max-width:680px;
  max-height:90vh;
  transform:translateY(100%); transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle {
  width:40px; height:4px; border-radius:2px;
  background:var(--border2); margin:12px auto 0;
  flex-shrink:0;
}
.modal-header {
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; flex-shrink:0;
}
.modal-icon { font-size:26px; }
.modal-title {
  font-family:'Cormorant Garamond',serif;
  font-size:22px; flex:1;
}
.modal-close {
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:6px 12px;
  color:var(--muted); cursor:pointer; font-size:18px;
  transition: color .2s;
}
.modal-close:hover { color:var(--white); }
.modal-body { flex:1; overflow-y:auto; padding:20px 24px 32px; }

/* PROMPT DISPLAY */
.prompt-box {
  background: var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  font-family:'Outfit',sans-serif;
  font-size:13px; color:#c8c8e8;
  white-space:pre-wrap; line-height:1.8;
  max-height:52vh; overflow-y:auto;
  margin-bottom:16px;
}
.btn-copy-prompt {
  width:100%;
  background:var(--rose);
  color:white; border:none;
  border-radius:12px; padding:14px;
  font-family:'Outfit',sans-serif;
  font-size:14px; font-weight:500;
  cursor:pointer; transition:opacity .2s;
}
.btn-copy-prompt:hover { opacity:.88; }

/* FICHA INLINE */
.ficha-wrap { font-size:13px; }
.ficha-section { margin-bottom:24px; }
.ficha-sec-title {
  font-size:11px; letter-spacing:2px; color:var(--rose2);
  text-transform:uppercase; margin-bottom:12px;
  padding-bottom:8px; border-bottom:1px solid var(--border);
}
.ficha-field { margin-bottom:14px; }
.ficha-label {
  font-size:11px; letter-spacing:1px; color:var(--muted);
  text-transform:uppercase; margin-bottom:6px;
  display:block;
}
.ficha-label .req { color:var(--rose); }
.ficha-hint { font-size:11px; color:var(--muted); font-style:italic; margin-bottom:6px; }
.ficha-input, .ficha-textarea, .ficha-select {
  width:100%; background:var(--card);
  border:1px solid var(--border);
  border-radius:8px; padding:10px 14px;
  color:var(--white); font-family:'Outfit',sans-serif;
  font-size:13px; outline:none;
  transition:border-color .2s;
}
.ficha-input:focus, .ficha-textarea:focus { border-color:var(--rose); }
.ficha-textarea { resize:vertical; min-height:72px; line-height:1.6; }
.ficha-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.opt-pills { display:flex; flex-wrap:wrap; gap:6px; }
.opt-pill {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:6px 12px;
  font-size:12px; cursor:pointer;
  transition:all .2s; user-select:none;
}
.opt-pill input { display:none; }
.opt-pill:has(input:checked) { background:#d4607a22; border-color:var(--rose); color:var(--rose2); }
.ficha-extras { display:flex; flex-direction:column; gap:8px; }
.ficha-extra {
  display:flex; align-items:center; gap:10px;
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:10px 14px;
  cursor:pointer; transition:all .2s;
}
.ficha-extra:has(input:checked) { border-color:var(--rose); background:#d4607a11; }
.ficha-extra input { display:none; }
.fe-box {
  width:18px; height:18px; border-radius:5px;
  border:2px solid var(--border); background:var(--card2);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; flex-shrink:0; transition:all .2s;
}
.ficha-extra:has(input:checked) .fe-box { background:var(--rose); border-color:var(--rose); color:white; }
.fe-icon { font-size:18px; flex-shrink:0; }
.fe-info { flex:1; }
.fe-name { font-size:13px; font-weight:500; }
.fe-desc { font-size:11px; color:var(--muted); margin-top:2px; }
.ficha-tip {
  background:#d4607a14; border:1px solid #d4607a44;
  border-radius:8px; padding:10px 14px;
  font-size:12px; color:var(--rose2); line-height:1.6;
  margin-bottom:12px;
}
.btn-gerar {
  width:100%; background:var(--rose);
  color:white; border:none; border-radius:12px;
  padding:14px; font-family:'Outfit',sans-serif;
  font-size:14px; font-weight:500; cursor:pointer;
  margin-top:20px; transition:opacity .2s;
}
.btn-gerar:hover { opacity:.88; }
.resumo-box {
  background:var(--bg); border:1px solid var(--border);
  border-radius:10px; padding:16px;
  font-size:12px; color:#c8c8e8; white-space:pre-wrap;
  line-height:1.8; margin-top:12px;
  max-height:300px; overflow-y:auto;
  display:none;
}
.resumo-box.visible { display:block; }
.btn-copy-resumo {
  width:100%; background:var(--card2);
  border:1px solid var(--border); border-radius:10px;
  padding:12px; color:var(--white);
  font-family:'Outfit',sans-serif; font-size:13px;
  cursor:pointer; margin-top:8px; transition:all .2s;
  display:none;
}
.btn-copy-resumo.visible { display:block; }
.btn-copy-resumo:hover { border-color:var(--rose); color:var(--rose2); }

/* TOAST */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--card2); border:1px solid var(--border);
  color:var(--white); padding:12px 24px;
  border-radius:40px; font-size:13px; z-index:999;
  opacity:0; transition:all .35s; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* FOOTER */
footer {
  position:relative; z-index:1;
  text-align:center; padding:32px 20px;
  font-size:12px; color:var(--border2);
  border-top:1px solid var(--border);
}

@media(max-width:480px){
  .pcard-actions { flex-direction:column; gap:6px; }
  .btn-action { justify-content:center; }
  .ficha-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="particles"></div>

<header>
  <div class="logo-tag">✦ Sistema Interno ✦</div>
  <div class="logo-title">Presentes <em>Digitais</em></div>
  <div class="logo-sub">Catálogo de sites presente — prompts e fichas de pedido</div>
  <div class="logo-line"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Buscar presente…" id="search-input" oninput="filterCards()">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('casal',this)">💕 Casal</button>
    <button class="filter-btn" onclick="setFilter('aniversario',this)">🎂 Aniversário</button>

    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-icon" id="mp-icon"></div>
      <div class="modal-title" id="mp-title"></div>
      <button class="modal-close" onclick="closeModal('prompt')">✕</button>
    </div>
    <div class="modal-body">
      <div class="prompt-box" id="mp-content"></div>
      <button class="btn-copy-prompt" onclick="copyPrompt()">📋 Copiar Prompt</button>
    </div>
  </div>
</div>

<!-- MODAL FICHA -->
<div class="modal-overlay" id="modal-ficha" onclick="closeModal('ficha')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-icon" id="mf-icon"></div>
      <div class="modal-title" id="mf-title"></div>
      <button class="modal-close" onclick="closeModal('ficha')">✕</button>
    </div>
    <div class="modal-body ficha-wrap" id="mf-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>Presentes Digitais · Sistema Interno · 2026 ✦</footer>

function buildFichaGeral(nome, icon, cat){
  return `<div class="ficha-section">
    <div class="ficha-sec-title">👫 O Casal</div>
    <div class="ficha-row">
      <div class="ficha-field"><label class="ficha-label">Quem presenteia <span class="req">*</span></label><input class="ficha-input" placeholder="Nome" data-key="NOME1"></div>
      <div class="ficha-field"><label class="ficha-label">Quem recebe <span class="req">*</span></label><input class="ficha-input" placeholder="Nome" data-key="NOME2"></div>
    </div>
    <div class="ficha-field"><label class="ficha-label">Apelidos carinhosos</label><input class="ficha-input" placeholder="Ex: Bebê, Amor, Princesa…" data-key="APELIDOS"></div>
    <div class="ficha-field"><label class="ficha-label">Tipo</label><div class="opt-pills">
      <label class="opt-pill"><input type="radio" name="tipo_rel_${cat}" value="Namorados"><span>💕 Namorados</span></label>
      <label class="opt-pill"><input type="radio" name="tipo_rel_${cat}" value="Noivos"><span>💍 Noivos</span></label>
      <label class="opt-pill"><input type="radio" name="tipo_rel_${cat}" value="Casados"><span>🥂 Casados</span></label>
    </div></div>
  </div>
  <div class="ficha-section">
    <div class="ficha-sec-title">📅 Datas</div>
    <div class="ficha-row">
      <div class="ficha-field"><label class="ficha-label">Se conheceram</label><input type="date" class="ficha-input" data-key="DT_CONHECERAM"></div>
      <div class="ficha-field"><label class="ficha-label">Primeiro beijo</label><input type="date" class="ficha-input" data-key="DT_BEIJO"></div>
    </div>
    <div class="ficha-field"><label class="ficha-label">Data do namoro/casamento <span class="req">*</span></label><input type="date" class="ficha-input" data-key="DT_NAMORO"></div>
    <div class="ficha-field"><label class="ficha-label">Onde se conheceram</label><input class="ficha-input" placeholder="Ex: Academia de karatê, faculdade…" data-key="LOCAL_CONHECERAM"></div>
    <div class="ficha-field"><label class="ficha-label">Local do pedido</label><input class="ficha-input" placeholder="Ex: Na frente da academia, restaurante…" data-key="LOCAL_PEDIDO"></div>
    <div class="ficha-field"><label class="ficha-label">Outras datas marcantes</label><textarea class="ficha-textarea" rows="3" placeholder="Ex: 2018 — foram morar juntos…" data-key="OUTRAS_DATAS"></textarea></div>
    <div class="ficha-field"><label class="ficha-label">Cidade onde se conheceram <span class="req">*</span></label><input class="ficha-input" placeholder="Ex: Cavaleiro, Jaboatão — PE" data-key="CIDADE"></div>
  </div>
  <div class="ficha-section">
    <div class="ficha-sec-title">📖 A História</div>
    <div class="ficha-tip">💡 Escreva de forma informal — quanto mais detalhes, mais especial fica!</div>
    <div class="ficha-field"><label class="ficha-label">Como se conheceram <span class="req">*</span></label><textarea class="ficha-textarea" rows="3" placeholder="Como foi o primeiro encontro?" data-key="HISTORIA_ENCONTRO"></textarea></div>
    <div class="ficha-field"><label class="ficha-label">Momentos inesquecíveis</label><textarea class="ficha-textarea" rows="4" placeholder="Viagens, conquistas, momentos especiais…" data-key="MOMENTOS"></textarea></div>
    <div class="ficha-field"><label class="ficha-label">O que mais ama nessa pessoa</label><textarea class="ficha-textarea" rows="3" placeholder="Jeitos, hábitos, qualidades…" data-key="QUALIDADES"></textarea></div>
    <div class="ficha-field"><label class="ficha-label">Frase ou piada interna</label><input class="ficha-input" placeholder="Algo que só vocês dois entendem…" data-key="FRASE_INTERNA"></div>
  </div>
  <div class="ficha-section">
    <div class="ficha-sec-title">🎵 Música</div>
    <div class="ficha-field"><label class="ficha-label">Música do casal <span class="req">*</span></label><input class="ficha-input" placeholder="Ex: Anjo — Saulo" data-key="MUSICA"></div>
    <div class="ficha-field"><label class="ficha-label">Por que é especial</label><input class="ficha-input" placeholder="História por trás da música…" data-key="MUSICA_HISTORIA"></div>
  </div>
  <div class="ficha-section">
    <div class="ficha-sec-title">⭐ Extras</div>
    <div class="ficha-extras">
      ${buildExtras()}
    </div>
  </div>
  <div class="ficha-section">
    <div class="ficha-sec-title">💌 Mensagem Final</div>
    <div class="ficha-tip">💡 Escreva do coração — vou deixar ela linda no site!</div>
    <div class="ficha-field"><label class="ficha-label">Mensagem de amor <span class="req">*</span></label><textarea class="ficha-textarea" rows="6" placeholder="Tudo que quer dizer…" data-key="MENSAGEM_AMOR"></textarea></div>
    <div class="ficha-field"><label class="ficha-label">Tom</label><div class="opt-pills">
      <label class="opt-pill"><input type="radio" name="tom_${cat}" value="Romântico"><span>🌹 Romântico</span></label>
      <label class="opt-pill"><input type="radio" name="tom_${cat}" value="Poético"><span>🌙 Poético</span></label>
      <label class="opt-pill"><input type="radio" name="tom_${cat}" value="Divertido"><span>😄 Divertido</span></label>
      <label class="opt-pill"><input type="radio" name="tom_${cat}" value="Simples"><span>🤍 Simples</span></label>
    </div></div>
    <div class="ficha-field"><label class="ficha-label">Assinatura</label><input class="ficha-input" placeholder="Ex: Com todo meu amor, Eduardo 🤍" data-key="ASSINATURA"></div>
  </div>
  <div class="ficha-section">
    <div class="ficha-sec-title">📦 Entrega</div>
    <div class="ficha-row">
      <div class="ficha-field"><label class="ficha-label">WhatsApp <span class="req">*</span></label><input class="ficha-input" placeholder="(81) 9 9999-9999" data-key="WHATSAPP"></div>
      <div class="ficha-field"><label class="ficha-label">Precisa até <span class="req">*</span></label><input type="date" class="ficha-input" data-key="DT_ENTREGA"></div>
    </div>
    <div class="ficha-field"><label class="ficha-label">Observações</label><textarea class="ficha-textarea" rows="2" placeholder="Algo especial ou extra?" data-key="OBS"></textarea></div>
  </div>`;
}

// ===== RENDER CARDS =====
let currentFilter = 'todos';
function renderCards(list){
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  document.getElementById('grid-label').textContent = `${list.length} presente${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}`;
  list.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className='pcard';
    card.dataset.id=p.id;
    card.style.cssText=`--accent:${p.accent}; transition-delay:${i*40}ms`;
    card.innerHTML=`
      <div class="pcard-inner">
        <div class="pcard-accent"></div>
        <div class="pcard-body">
          <div class="pcard-icon">${p.icon}</div>
          <div class="pcard-info">
            <div class="pcard-name">${p.nome}</div>
            <div class="pcard-cat">${catLabel(p.cat)}</div>
          </div>
          <div class="pcard-actions">
            <button class="btn-action btn-prompt" onclick="openPrompt('${p.id}')">📋 Prompt</button>
            <button class="btn-action btn-ficha" onclick="openFicha('${p.id}')">📝 Ficha</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
    requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add('visible')));
  });
}

function catLabel(c){ return {casal:'💕 Casal',aniversario:'🎂 Aniversário',familia:'👨‍👩‍👧 Família',bodas:'💍 Bodas'}[c]||c; }

function setFilter(cat, btn){
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards(){
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = PRESENTES.filter(p=>{
    const matchCat = currentFilter==='todos' || p.cat===currentFilter;
    const matchQ = !q || p.nome.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderCards(list);
}

// ===== MODAL PROMPT =====
function openPrompt(id){
  const p = PRESENTES.find(x=>x.id===id);
  document.getElementById('mp-icon').textContent = p.icon;
  document.getElementById('mp-title').textContent = p.nome;
  document.getElementById('mp-content').textContent = p.prompt;
  document.getElementById('modal-prompt').classList.add('open');
  document.body.style.overflow='hidden';
}
function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('mp-content').textContent)
    .then(()=>showToast('✅ Prompt copiado!'));
}

// ===== MODAL FICHA =====
function openFicha(id){
  const p = PRESENTES.find(x=>x.id===id);
  document.getElementById('mf-icon').textContent = p.icon;
  document.getElementById('mf-title').textContent = p.nome;
  const body = document.getElementById('mf-body');
  body.innerHTML = p.ficha + `
    <button class="btn-gerar" onclick="gerarResumoDaFicha(this)">✨ Gerar Resumo do Pedido</button>
    <div class="resumo-box" id="resumo-box-${id}"></div>
    <button class="btn-copy-resumo" id="btn-copy-res-${id}" onclick="copyResumo('${id}')">📋 Copiar Resumo</button>`;
  // sync checkbox visuals
  body.querySelectorAll('.ficha-extra').forEach(ex=>{
    const inp = ex.querySelector('input');
    const box = ex.querySelector('.fe-box');
    const sync=()=>box.textContent=inp.checked?'✓':'';
    sync(); inp.addEventListener('change',sync);
  });
  document.getElementById('modal-ficha').classList.add('open');
  document.body.style.overflow='hidden';
}

function gerarResumoDaFicha(btn){
  const modal = btn.closest('.modal');
  const id = modal.closest('.modal-overlay').id.replace('modal-','');
  // collect fields
  const fields = {};
  modal.querySelectorAll('[data-key]').forEach(el=>{
    fields[el.dataset.key] = el.value||'—';
  });
  // collect radios
  modal.querySelectorAll('input[type=radio]:checked').forEach(el=>{
    fields[el.name] = el.value;
  });
  // collect extras
  const extras = [];
  modal.querySelectorAll('.ficha-extra').forEach(ex=>{
    if(ex.querySelector('input').checked)
      extras.push(ex.querySelector('.fe-name').textContent);
  });
  fields['EXTRAS'] = extras.join(', ') || '—';

  let txt = `🎁 PEDIDO — ${document.getElementById('mf-title').textContent.toUpperCase()}\n`;
  txt += '━'.repeat(40) + '\n\n';
  Object.entries(fields).forEach(([k,v])=>{ if(v&&v!=='—') txt+=`• ${k.replace(/_/g,' ')}: ${v}\n`; });
  txt += '\n' + '━'.repeat(40);

  const resumoId = `mf-body`;
  const box = modal.querySelector('.resumo-box');
  const copyBtn = modal.querySelector('.btn-copy-resumo');
  box.textContent = txt;
  box.classList.add('visible');
  copyBtn.classList.add('visible');
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copyResumo(id){
  const box = document.getElementById('mf-body').querySelector('.resumo-box');
  if(box) navigator.clipboard.writeText(box.textContent).then(()=>showToast('✅ Resumo copiado!'));
}

function closeModal(type){
  document.getElementById(`modal-${type}`).classList.remove('open');
  document.body.style.overflow='';
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// INIT
renderCards(PRESENTES);
</script>
